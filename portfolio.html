<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Alisa McCloy</title>
  <meta name="description" content="Selected editorial photography and film work by Alisa McCloy, Canterbury." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="bg-stage" data-section="portfolio" aria-hidden="true">
    <div class="bg-stage__layer layer--home"      style="background-image:url('assets/images/bg-home.svg')"></div>
    <div class="bg-stage__layer layer--about"     style="background-image:url('assets/images/bg-about.svg')"></div>
    <div class="bg-stage__layer layer--portfolio" style="background-image:url('assets/images/bg-portfolio.svg')"></div>
    <div class="bg-stage__layer layer--contact"   style="background-image:url('assets/images/bg-contact.svg')"></div>
  </div>

  <header class="nav" id="nav">
    <a class="nav__brand" href="index.html"><span class="dot"></span>Alisa McCloy</a>
    <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h16M3 11h16M3 16h16"/></svg>
    </button>
    <nav class="nav__links" id="nav-links" aria-label="Primary">
      <a class="nav__link" data-bg="home"      href="index.html">Home</a>
      <a class="nav__link" data-bg="about"     href="about.html">About</a>
      <a class="nav__link" data-bg="portfolio" href="portfolio.html" aria-current="page">Portfolio</a>
      <a class="nav__link" data-bg="contact"   href="contact.html">Contact</a>
    </nav>
  </header>

  <main id="main">
    <header class="page-head container">
      <p class="eyebrow">Portfolio</p>
      <h1 class="page-head__title">Selected Work</h1>
      <p class="page-head__lede">A working edit of stills and motion. Toggle between photography and film, and click any frame to view it larger.</p>
    </header>

    <section class="section container" style="padding-top:0">
      <div class="filter" role="group" aria-label="Filter work">
        <button class="filter__btn" data-filter="all"   aria-pressed="true">All</button>
        <button class="filter__btn" data-filter="photo" aria-pressed="false">Photography</button>
        <button class="filter__btn" data-filter="film"  aria-pressed="false">Film</button>
      </div>

      <div class="work-grid">
        <button class="work" data-type="photo" data-title="Northbound" data-meta="Editorial · 2026" data-full="assets/images/DSC_0870.png">
          <img src="assets/images/DSC_0870.png" alt="Editorial photograph — Northbound" loading="lazy" />
        </button>

        <button class="work" data-type="film" data-title="Low Tide" data-meta="Short film · 2:14" data-embed="" data-full="assets/images/DSC_0930.png">
          <img src="assets/images/DSC_0930.png" alt="Film still — Low Tide" loading="lazy" />
        </button>

        <button class="work" data-type="photo" data-title="Quiet Hours" data-meta="Portrait · 2025" data-full="assets/images/DSC_0894.png">
          <img src="assets/images/DSC_0894.png" alt="Editorial photograph — Quiet Hours" loading="lazy" />
        </button>

        <button class="work" data-type="photo" data-title="Cassette" data-meta="Editorial · 2025" data-full="assets/images/DSC_0891.png">
          <img src="assets/images/DSC_0891.png" alt="Editorial photograph — Cassette" loading="lazy" />
        </button>

        <button class="work" data-type="film" data-title="Tenement" data-meta="Music video · 3:48" data-embed="" data-full="assets/images/DSC_0914.png">
          <img src="assets/images/DSC_0914.png" alt="Film still — Tenement" loading="lazy" />
        </button>

        <button class="work" data-type="photo" data-title="Brass" data-meta="Still life · 2025" data-full="assets/images/DSC_0897.png">
          <img src="assets/images/DSC_0897.png" alt="Editorial photograph — Brass" loading="lazy" />
        </button>

        <button class="work" data-type="photo" data-title="Westgate" data-meta="Street · 2024" data-full="assets/images/DSC_0892.png">
          <img src="assets/images/DSC_0892.png" alt="Editorial photograph — Westgate" loading="lazy" />
        </button>

        <button class="work" data-type="film" data-title="Off-Season" data-meta="Documentary · 6:02" data-embed="" data-full="assets/images/photo-06.svg">
          <img src="assets/images/photo-06.svg" alt="Film still — Off-Season" loading="lazy" />
        </button>

        <button class="work" data-type="photo" data-title="Halflight" data-meta="Portrait · 2024" data-full="assets/images/DSC_0847.png">
          <img src="assets/images/DSC_0847.png" alt="Editorial photograph — Halflight" loading="lazy" />
        </button>
      </div>
    </section>
  </main>

  <!-- Lightbox / film modal -->
  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Work viewer">
    <button class="lightbox__close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 3l12 12M15 3L3 15"/></svg>
    </button>
    <div>
      <div class="lightbox__stage"></div>
      <p class="lightbox__cap"></p>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer__row">
      <span class="nav__brand"><span class="dot"></span>Alisa McCloy</span>
      <span class="footer__meta">Editorial photography &amp; film · Canterbury, UK</span>
      <span class="footer__meta">© <span id="yr">2026</span> Alisa McCloy</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
