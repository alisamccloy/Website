<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work - Alisa McCloy</title>
  <meta name="description" content="Selected photography and film work by Alisa McCloy." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="work">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="side-nav" aria-label="Site navigation">
    <a class="brand" href="index.html">Alisa<br />McCloy</a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">Menu</button>
    <nav class="site-menu" id="site-menu">
      <a href="portfolio.html" aria-current="page">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <p class="side-note">Photography<br />Film<br />Canterbury</p>
  </header>

  <main id="main" class="page">
    <header class="page-head">
      <p class="kicker">Selected work</p>
      <h1>Stills and motion.</h1>
    </header>

    <div class="filter" role="group" aria-label="Filter work">
      <button class="filter__btn" data-filter="all" aria-pressed="true">All</button>
      <button class="filter__btn" data-filter="photo" aria-pressed="false">Photography</button>
      <button class="filter__btn" data-filter="film" aria-pressed="false">Film</button>
    </div>

    <section class="project-list" aria-label="Portfolio projects">
      <button class="project-card" data-type="photo" data-title="Northbound" data-meta="Editorial, 2026" data-full="assets/images/photo-01.svg">
        <img src="assets/images/photo-01.svg" alt="Editorial photograph - Northbound" />
        <span><b>Northbound</b><small>Editorial, 2026</small></span>
      </button>
      <button class="project-card" data-type="film" data-title="Low Tide" data-meta="Short film, 2:14" data-full="assets/images/film-01.svg">
        <img src="assets/images/film-01.svg" alt="Film still - Low Tide" />
        <span><b>Low Tide</b><small>Short film, 2:14</small></span>
      </button>
      <button class="project-card" data-type="photo" data-title="Quiet Hours" data-meta="Portrait, 2025" data-full="assets/images/photo-02.svg">
        <img src="assets/images/photo-02.svg" alt="Editorial photograph - Quiet Hours" />
        <span><b>Quiet Hours</b><small>Portrait, 2025</small></span>
      </button>
      <button class="project-card" data-type="photo" data-title="Cassette" data-meta="Editorial, 2025" data-full="assets/images/photo-03.svg">
        <img src="assets/images/photo-03.svg" alt="Editorial photograph - Cassette" />
        <span><b>Cassette</b><small>Editorial, 2025</small></span>
      </button>
      <button class="project-card" data-type="film" data-title="Tenement" data-meta="Music video, 3:48" data-full="assets/images/film-02.svg">
        <img src="assets/images/film-02.svg" alt="Film still - Tenement" />
        <span><b>Tenement</b><small>Music video, 3:48</small></span>
      </button>
      <button class="project-card" data-type="photo" data-title="Brass" data-meta="Still life, 2025" data-full="assets/images/photo-04.svg">
        <img src="assets/images/photo-04.svg" alt="Editorial photograph - Brass" />
        <span><b>Brass</b><small>Still life, 2025</small></span>
      </button>
    </section>
  </main>

  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Work viewer">
    <button class="lightbox__close" type="button" aria-label="Close">Close</button>
    <figure>
      <img class="lightbox__image" src="assets/images/photo-01.svg" alt="" />
      <figcaption class="lightbox__caption"></figcaption>
    </figure>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
