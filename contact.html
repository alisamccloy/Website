<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Alisa McCloy</title>
  <meta name="description" content="Contact Alisa McCloy for photography, film, commissions, assisting, and collaboration." />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="contact">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="side-nav" aria-label="Site navigation">
    <a class="brand" href="index.html">Alisa<br />McCloy</a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">Menu</button>
    <nav class="site-menu" id="site-menu">
      <a href="portfolio.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <p class="side-note">Photography<br />Film<br />Canterbury</p>
  </header>

  <main id="main" class="page contact-page">
    <section class="contact-hero">
      <p class="kicker">Contact</p>
      <h1>Let us make something quiet and exact.</h1>
      <a class="large-mail" href="mailto:hello@alisamccloy.com">hello@alisamccloy.com</a>
    </section>

    <section class="contact-grid">
      <form id="contactForm" novalidate>
        <label>
          Name
          <input type="text" id="name" name="name" autocomplete="name" required />
        </label>
        <label>
          Email
          <input type="email" id="email" name="email" autocomplete="email" required />
        </label>
        <label>
          Message
          <textarea id="message" name="message" required></textarea>
        </label>
        <button class="text-link" type="submit">Send enquiry</button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>

      <aside>
        <p>Based in Canterbury, UK. Available for commissions, assisting, editorial projects, short films, and travel.</p>
        <nav class="social-links" aria-label="Social links">
          <a href="#">Instagram</a>
          <a href="#">Vimeo</a>
          <a href="#">LinkedIn</a>
        </nav>
      </aside>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
